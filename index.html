<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SignUp Form</title>
    <link rel="stylesheet" href="./style.css" />
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
    <link rel="manifest" href="site.webmanifest">
  </head>
  <body>
    <main>
      <form class="form-container">
      <h1 id="signup">Signup</h1>
      <div class="container placeBorder">
        <input 
           type="text" 
           id="name"
           placeholder="Full Name" 
           required />
      </div>
      <div class="container placeBorder">
        <input
          type="email"
          id="gmail"
          placeholder="Email"
          required
        />
      </div>
      <div class="container placeBorder">
        <input
        type="password"
        id="password"
        placeholder="Password"
        required
        />
      </div>
      <div class="container placeBorder">
        <input
        type="password"
        id="confirmPassword"
        placeholder="Confirm Password"
        required
        />
        <p class="fail"></p>
      </div>
      <div class="container placeBorder">
        <input type="date" id="dob" required />
      </div>
        <div class="class1">
        <input type="radio" id="student" name="person" />
        <label for="student">Student</label>
        <input type="radio" id="employee" name="person" />
        <label for="employee">Employee</label>
        </div>
        <div class="class1">
        <input type="checkbox" id="toc" />
        <label for="toc">I agree terms & conditions</label>
         </div>
        <div class="container">
        <button id="btn">Signup</button>
      </div>
    </form>
   </main>
  </body>
  <script src="./script.js"></script>
</html>
